version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - echo Setting up Kubeconfig...
      - aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_://amazonaws.com
      - docker tag brain-tasks-app:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_://amazonaws.com
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image to ECR...
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_://amazonaws.com
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_://amazonaws.com
      - echo Updating Kubernetes manifests...
      - sed -i "s|brain-tasks-app:latest|brain-tasks-app:$CODEBUILD_RESOLVED_SOURCE_VERSION|g" kubernetes/deployment.yml
      - echo Deploying to AWS EKS cluster...
      - kubectl apply -f kubernetes/deployment.yml
      - kubectl apply -f kubernetes/service.yml

